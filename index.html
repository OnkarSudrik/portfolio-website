<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Character encoding -->
    <meta charset="UTF-8" />

    <!-- Ensure proper rendering and touch zooming on mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Compatibility for older IE browsers -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    
    <!-- Primary SEO Title -->
    <title>Onkar Sudrik | Machine Learning Engineer</title>
    
    <!-- Meta Description (maximum ~160 characters for best practices) -->
    <meta
      name="description"
      content="Welcome to the official portfolio of Onkar Sudrik, a passionate Machine Learning Engineer. Discover his projects, experience, and expertise in ML and AI."
    />
    
    <!-- Meta Keywords (SEO impact is minimal these days, but can still be helpful) -->
    <meta
      name="keywords"
      content="Onkar Sudrik, Machine Learning Engineer, Data Science, AI, Portfolio, onkarsudrik.com"
    />
    
    <!-- Author -->
    <meta name="author" content="Onkar Sudrik" />
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://www.onkarsudrik.com" />

    <!-- Open Graph / Facebook Meta Tags -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Onkar Sudrik | Machine Learning Engineer" />
    <meta
      property="og:description"
      content="Portfolio website of Onkar Sudrik, a Machine Learning Engineer with expertise in data analytics, ML, and AI solutions."
    />
    <meta property="og:url" content="https://www.onkarsudrik.com" />
    <!-- If you have a sharing image, add: <meta property="og:image" content="URL_to_image" /> -->

    <!-- Twitter Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Onkar Sudrik | Machine Learning Engineer" />
    <meta
      name="twitter:description"
      content="Portfolio website of Onkar Sudrik, a Machine Learning Engineer with expertise in data analytics, ML, and AI solutions."
    />
    <meta name="twitter:url" content="https://www.onkarsudrik.com" />
    <!-- If you have a sharing image, add: <meta name="twitter:image" content="URL_to_image" /> -->

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" />

    <!-- External Fonts (Brittany Signature) -->
    <link
      href="https://fonts.cdnfonts.com/css/brittany-signature"
      rel="stylesheet"
    />

    <!-- Additional CSS or other metadata can go here -->
  </head>
  <body class="bg-primaryBg text-primaryText font-sans">
    <div id="root"></div>

    <!-- Main React (or other) entry point script -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
